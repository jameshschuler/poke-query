<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeQuery API Docs</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .repo-link {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 1000;
        border: 1px solid #d4d4d8;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.95);
        color: #18181b;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        padding: 8px 12px;
      }
      .repo-link:hover {
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <a
      class="repo-link"
      href="https://github.com/jameshschuler/poke-query"
      target="_blank"
      rel="noreferrer"
    >
      GitHub Repository
    </a>
    <script
      id="api-reference"
      data-url="./data/openapi.json"
      data-configuration='{
        "theme": "default",
        "layout": "sidebar",
        "defaultHttpClient": {
          "targetKey": "shell",
          "clientKey": "curl"
        }
      }'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
