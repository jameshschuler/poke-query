name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-qa:
    name: Deploy QA Backend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger QA backend deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_QA_BACKEND_DEPLOY_HOOK }}"

  deploy-qa-frontend:
    name: Deploy QA Frontend
    if: github.event_name == 'push' && secrets.RENDER_QA_FRONTEND_DEPLOY_HOOK != ''
    runs-on: ubuntu-latest
    needs: [deploy-qa]

    steps:
      - name: Trigger QA frontend deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_QA_FRONTEND_DEPLOY_HOOK }}"

  deploy-qa-docs:
    name: Deploy QA Docs
    if: github.event_name == 'push' && secrets.RENDER_QA_DOCS_DEPLOY_HOOK != ''
    runs-on: ubuntu-latest
    needs: [deploy-qa]

    steps:
      - name: Trigger QA docs deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_QA_DOCS_DEPLOY_HOOK }}"

  deploy-prod:
    name: Deploy Production Backend
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger production backend deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"

  deploy-prod-frontend:
    name: Deploy Production Frontend
    if: github.event_name == 'workflow_dispatch' && secrets.RENDER_PROD_FRONTEND_DEPLOY_HOOK != ''
    runs-on: ubuntu-latest
    needs: [deploy-prod]

    steps:
      - name: Trigger production frontend deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_PROD_FRONTEND_DEPLOY_HOOK }}"

  deploy-prod-docs:
    name: Deploy Production Docs
    if: github.event_name == 'workflow_dispatch' && secrets.RENDER_PROD_DOCS_DEPLOY_HOOK != ''
    runs-on: ubuntu-latest
    needs: [deploy-prod]

    steps:
      - name: Trigger production docs deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_PROD_DOCS_DEPLOY_HOOK }}"
