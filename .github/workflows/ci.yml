name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend - Lint, Format Check, Build, Unit Tests
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      COOKIE_SECRET: ci-cookie-secret
      CORS_ORIGIN: http://localhost:3000

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  backend-integration:
    name: Backend - Integration Tests
    runs-on: ubuntu-latest
    needs: [backend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: poke_query_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poke_query_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/poke_query_test
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      COOKIE_SECRET: ci-cookie-secret
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Integration tests
        run: npm run test:integration

  frontend:
    name: Frontend - Format Check, Lint, Test, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docs-site:
    name: Docs Site - Generate OpenAPI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs-site

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/poke_query_test
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      COOKIE_SECRET: ci-cookie-secret
      CORS_ORIGIN: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install docs dependencies
        run: npm ci

      - name: Generate docs
        run: npm run docs:generate
